<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="src/assets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Beng Espoir Nong, a product designer and software engineering student building UI/UX, web, mobile, and AI-assisted digital products."
    />
    <meta name="theme-color" content="#6b57ea" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Beng Espoir | Portfolio</title>
    <script>
      (function initializeTheme() {
        try {
          var savedTheme = localStorage.getItem("portfolio-theme");
          var useDark = savedTheme
            ? savedTheme === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (useDark) {
            document.documentElement.classList.add("dark");
          }
        } catch (error) {
          // No-op: keep default light mode when storage is unavailable.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
